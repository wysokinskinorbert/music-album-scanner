name: music_album_scanner
description: AI-powered music album scanner and collector for Android.
publish_to: 'none'
version: 0.4.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Camera & Images
  camera: ^0.11.1
  image_picker: ^1.1.2
  image: ^4.5.4

  # Google ML Kit
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_image_labeling: ^0.12.0
  google_mlkit_barcode_scanning: ^0.12.0

  # ML / TFLite
  tflite_flutter: ^0.11.0
  tflite_flutter_helper_plus: ^0.0.4

  # UI
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  share_plus: ^10.1.4

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  logger: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
