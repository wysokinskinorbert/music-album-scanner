name: music_album_scanner
description: AI-powered music album scanner and collector for Android.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  material_color_utilities: ^1.0.2

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Camera & Image
  camera: ^0.11.1
  image_picker: ^1.1.2
  image: ^4.5.4
  photo_view: ^0.15.0

  # Image Editor
  crop_image: ^1.0.13

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^7.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # ML / Recognition
  google_mlkit_image_labeling: ^0.12.0
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_barcode_scanning: ^0.13.0
  tflite_flutter: ^0.11.0

  # Utility
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^11.0.0
  url_launcher: ^6.3.1
  permission_handler: ^12.0.0+1.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.14
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/
